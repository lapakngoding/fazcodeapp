{% extends "base.html" %}

{% block content %}
<div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Tambah Pengguna Baru</h1>
    <a href="{% url 'dashboard:user_list' %}" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
        <i class="fas fa-arrow-left fa-sm text-white-50"></i> Kembali ke Daftar
    </a>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Data Akun User</h6>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username</label>
                        {{ form.username }}
                        <small class="form-text text-muted">Gunakan nama tanpa spasi.</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        {{ form.email }}
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Role / Jabatan</label>
                                {{ form.role }}
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Password Awal</label>
                                {{ form.password }}
                            </div>
                        </div>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-primary btn-icon-split">
                        <span class="icon text-white-50">
                            <i class="fas fa-save"></i>
                        </span>
                        <span class="text">Simpan User Baru</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
