{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Fazcodeapp - Ganti Password Baru</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

    <style>
        body, html { height: 100%; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; }
        .form-control-user { border-radius: 10rem; padding: 1.5rem 1rem; }
        .card-custom { border-radius: 1rem; }
    </style>
</head>

<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-5 col-lg-6 col-md-9">
                <div class="card o-hidden border-0 shadow-lg card-custom">
                    <div class="card-body p-0">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-2 font-weight-bold">Buat Password Baru</h1>
                                <p class="mb-4 small text-muted">Silakan masukkan password baru Anda. Pastikan kombinasi yang kuat agar akun tetap aman.</p>
                            </div>

                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                                        <small>{{ message }}</small>
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <form class="user" method="POST">
                                {% csrf_token %}
                                <div class="form-group">
                                    <input type="password" name="password" class="form-control form-control-user" 
                                           placeholder="Password Baru..." required autofocus minlength="8">
                                </div>
                                <div class="form-group">
                                    <input type="password" name="confirm_password" class="form-control form-control-user" 
                                           placeholder="Ulangi Password Baru..." required minlength="8">
                                </div>
                                <hr>
                                <button type="submit" class="btn btn-primary btn-user btn-block shadow">
                                    <i class="fas fa-save fa-sm fa-fw mr-2"></i> Simpan Password Baru
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <small class="text-white-50">Sistem Keamanan - Fazcodeapp 2026</small>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
