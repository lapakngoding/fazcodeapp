{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ APP_NAME }}</title>
    
    <link rel="stylesheet" href="https://demo.themesberg.com/volt/css/volt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Sidebar tetap di kiri */
        .sidebar { 
            width: 260px; 
            height: 100vh; 
            position: fixed; 
            left: 0; 
            top: 0; 
            z-index: 1000; 
            overflow-y: auto; /* Agar sidebar bisa di-scroll jika menu banyak */
        }

        /* Konten utama terdorong ke kanan */
        .content { 
            margin-left: 260px; /* Harus sama dengan lebar sidebar */
            width: calc(100% - 260px); 
            min-height: 100vh; 
            padding: 2rem;
            background-color: #f2f5f9; 
        }

        /* Pengaturan untuk Layar Kecil (Mobile) */
        @media (max-width: 992px) {
            .sidebar { 
                left: -260px; 
                transition: transform 0.3s ease-in-out; 
            }
            .sidebar.show { 
                transform: translateX(260px); 
            }
            .content { 
                margin-left: 0; 
                width: 100%; 
            }
        }
    </style>
</head>
<body class="bg-soft">
    <nav class="navbar navbar-dark navbar-theme-primary px-4 col-12 d-lg-none">
        <a class="navbar-brand me-lg-5" href="/">
            <span class="h5 text-white">{{ APP_NAME }}</span>
        </a>
        <div class="d-flex align-items-center">
            <button class="navbar-toggler d-lg-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="d-flex">
        <nav id="sidebarMenu" class="sidebar bg-gray-800 text-white p-3 collapse d-lg-block">
            <div class="sidebar-inner">
                <div class="d-none d-lg-flex align-items-center justify-content-between mb-4 px-2">
                    <h2 class="h4 mb-0 text-white">{{ APP_NAME }}</h2>
                    <a href="#" class="text-white d-lg-none" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                        <i class="fas fa-times fa-lg"></i>
                    </a>
                </div>
                
                <hr class="mb-4 border-gray-700">
                {% include ACTIVE_THEME|add:"includes/_sidebar.html" %}
            </div>
        </nav>

        <main class="content">
            <nav class="navbar navbar-top navbar-expand navbar-dashboard navbar-dark ps-0 pe-2 pb-4 d-none d-lg-flex">
                <div class="container-fluid px-0">
                    <div class="d-flex justify-content-between w-100">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb breadcrumb-dark breadcrumb-transparent">
                                <li class="breadcrumb-item"><a href="#"><i class="fas fa-home"></i></a></li>
                                <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
                            </ol>
                        </nav>
                        <div class="d-flex align-items-center">
                            ...
                        </div>
                    </div>
                </div>
            </nav>

            <div class="card border-0 shadow p-4">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
